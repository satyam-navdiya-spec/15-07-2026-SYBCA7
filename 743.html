<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My New Web Page</title>
    <style>
        /* Basic modern CSS reset and styling */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #1e293b;
            color: #ffffff;
            padding: 1rem 2rem;
            text-align: center;
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        footer {
            background-color: #1e293b;
            color: #94a3b8;
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My New Project</h1>
    </header>

    <main>
        <section class="card">
            <h2>Getting Started</h2>
            <p>This is a fresh, responsive HTML template ready for your content. You can edit this text, add images, or style it however you like.</p>
            <button id="alertBtn">Click Me</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>

    <script>
        // Simple JavaScript interaction
        const button = document.getElementById('alertBtn');
        button.addEventListener('click', () => {
            alert('Hello! Your new HTML file is working perfectly.');
        });
    </script>

</body>
  </html>
